<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연차 · 반차 현황판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Gmarket+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #f8f9fb;
  --border: #e2e6ed;
  --border2: #d0d5df;
  --text: #1a1f2e;
  --text2: #5a6478;
  --text3: #8a94a8;
  --accent: #3b5bdb;
  --accent2: #e8edff;
  --danger: #e03131;
  --success: #2f9e44;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow2: 0 4px 24px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius2: 8px;
  --header-h: 58px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
}

/* ─── LOCK SCREEN ─── */
#lockScreen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #1a1f2e 0%, #2d3561 50%, #1a1f2e 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 8px;
}
#lockScreen .lock-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 48px 56px;
  text-align: center;
  backdrop-filter: blur(20px);
  min-width: 320px;
}
#lockScreen .lock-icon { font-size: 48px; margin-bottom: 20px; }
#lockScreen h2 {
  font-family: 'Gmarket Sans', sans-serif;
  color: #fff;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}
#lockScreen p { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 28px; }
#lockScreen input {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 20px;
  letter-spacing: 8px;
  text-align: center;
  outline: none;
  margin-bottom: 16px;
  font-family: 'Noto Sans KR', sans-serif;
  transition: border-color 0.2s;
}
#lockScreen input:focus { border-color: rgba(255,255,255,0.5); }
#lockScreen input.shake {
  animation: shake 0.4s ease;
  border-color: #ff6b6b !important;
}
#lockScreen button {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background 0.2s, transform 0.1s;
}
#lockScreen button:hover { background: #2f4fc4; }
#lockScreen button:active { transform: scale(0.98); }
#lockScreen .err { color: #ff8787; font-size: 12px; margin-top: 10px; min-height: 18px; }
#lockScreen .readonly-btn {
  margin-top: 14px;
  background: none;
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  padding: 8px;
}
#lockScreen .readonly-btn:hover { background: rgba(255,255,255,0.05); }

/* ─── HEADER ─── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: #1a1f2e;
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 16px;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.2);
}
#header .logo {
  font-family: 'Gmarket Sans', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.3px;
}
#header .logo span { color: #748ffc; }
#header nav { margin-left: auto; display: flex; gap: 8px; align-items: center; }
#header nav button {
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.8);
  font-size: 12px;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}
#header nav button:hover { background: rgba(255,255,255,0.1); color: #fff; }
#header nav button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.badge-ro {
  font-size: 10px;
  background: rgba(255,165,0,0.2);
  color: orange;
  border: 1px solid rgba(255,165,0,0.3);
  border-radius: 4px;
  padding: 2px 6px;
  margin-left: 4px;
}

/* ─── APP ─── */
#app {
  margin-top: var(--header-h);
  display: flex;
  height: calc(100vh - var(--header-h));
}

/* ─── LEFT: MONTH LIST ─── */
#sidebar {
  width: 64px;
  background: #1e2438;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 12px 0;
  gap: 2px;
  flex-shrink: 0;
}
#sidebar::-webkit-scrollbar { width: 0; }
.month-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 4px;
  cursor: pointer;
  border-radius: 10px;
  margin: 0 6px;
  transition: all 0.15s;
  gap: 2px;
}
.month-tab .m-num {
  font-family: 'Gmarket Sans', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: rgba(255,255,255,0.4);
  line-height: 1;
}
.month-tab .m-txt {
  font-size: 9px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.5px;
}
.month-tab:hover .m-num { color: rgba(255,255,255,0.8); }
.month-tab.active { background: rgba(59,91,219,0.3); }
.month-tab.active .m-num { color: #748ffc; }
.month-tab.active .m-txt { color: #748ffc; }

/* ─── MAIN AREA ─── */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ─── CALENDAR ─── */
#calArea {
  width: 520px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.cal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.cal-header h2 {
  font-family: 'Gmarket Sans', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.cal-header .sub { color: var(--text3); font-size: 12px; margin-top: 4px; }
.cal-scroll { overflow-y: auto; flex: 1; padding: 16px; }
.cal-scroll::-webkit-scrollbar { width: 4px; }
.cal-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.cal-day-label {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  padding: 6px 0;
  color: var(--text3);
}
.cal-day-label:first-child { color: #e03131; }
.cal-day-label:last-child { color: #3b5bdb; }

.cal-cell {
  aspect-ratio: 1;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.12s;
  background: var(--surface2);
  display: flex;
  flex-direction: column;
  min-height: 52px;
}
.cal-cell:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.cal-cell.today { border-color: var(--accent); }
.cal-cell.empty { background: transparent; cursor: default; border: none; }
.cal-cell.weekend-sun .day-num { color: #e03131; }
.cal-cell.weekend-sat .day-num { color: #3b5bdb; }
.day-num {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 6px 2px;
  color: var(--text);
  line-height: 1;
}
.cell-chips {
  padding: 2px 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  overflow: hidden;
}
.chip {
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 4px;
  color: #fff;
  font-weight: 600;
  white-space: nowrap;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
}
.more-chip {
  font-size: 9px;
  color: var(--text3);
  padding: 1px 4px;
}

/* ─── RIGHT: TABLE ─── */
#tableArea {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface);
}
.tbl-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.tbl-header h3 {
  font-family: 'Gmarket Sans', sans-serif;
  font-size: 18px;
  font-weight: 700;
}
.tbl-header .sub { color: var(--text3); font-size: 12px; margin-top: 4px; }
.tbl-scroll {
  flex: 1;
  overflow: auto;
}
.tbl-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
.tbl-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

#leaveTable {
  border-collapse: collapse;
  width: 100%;
  min-width: 600px;
  font-size: 12px;
}
#leaveTable th, #leaveTable td {
  border: 1px solid var(--border);
  padding: 0;
  text-align: center;
  white-space: nowrap;
}
#leaveTable thead th {
  background: #f0f2f5;
  font-weight: 600;
  font-size: 11px;
  color: var(--text2);
  position: sticky;
  top: 0;
  z-index: 2;
  padding: 8px 10px;
}
#leaveTable thead th.name-col {
  left: 0;
  z-index: 3;
  min-width: 80px;
}
#leaveTable tbody td.name-col {
  position: sticky;
  left: 0;
  background: var(--surface);
  font-weight: 600;
  font-size: 12px;
  padding: 8px 12px;
  z-index: 1;
  border-right: 2px solid var(--border2);
}
#leaveTable tbody tr:hover td { background: var(--accent2); }
#leaveTable tbody tr:hover td.name-col { background: var(--accent2); }
.tbl-cell { padding: 6px 8px; }
.tbl-badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  margin: 1px;
}
.sum-col {
  background: #f8f9fb !important;
  font-weight: 700 !important;
  color: var(--accent) !important;
  font-size: 12px !important;
}
.total-row td {
  background: #f0f2f5 !important;
  font-weight: 700 !important;
}

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--surface);
  border-radius: 16px;
  padding: 32px;
  min-width: 380px;
  max-width: 480px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  position: relative;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 {
  font-family: 'Gmarket Sans', sans-serif;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
}
.modal .modal-sub { color: var(--text3); font-size: 12px; margin-bottom: 24px; }
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 32px; height: 32px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: var(--border); }

.field-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.field-group { margin-bottom: 20px; }

.chip-select {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chip-select button {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--border2);
  background: var(--surface2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.12s;
  color: var(--text2);
}
.chip-select button:hover { border-color: var(--accent); color: var(--accent); }
.chip-select button.sel { color: #fff; border-color: transparent; }

.input-row {
  display: flex;
  gap: 8px;
}
.input-row input, .input-row select {
  flex: 1;
  padding: 10px 12px;
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--surface2);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.input-row input:focus, .input-row select:focus { border-color: var(--accent); }
input[list] { cursor: pointer; }

.modal-footer {
  display: flex;
  gap: 8px;
  margin-top: 24px;
}
.btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.12s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #2f4fc4; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #c92a2a; }
.btn-ghost {
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  color: var(--text2);
}
.btn-ghost:hover { background: var(--border); }

/* ─── ADMIN MODAL ─── */
.admin-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  background: var(--surface2);
  padding: 4px;
  border-radius: 10px;
}
.admin-tab {
  flex: 1;
  padding: 8px;
  border: none;
  background: transparent;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text3);
  transition: all 0.15s;
}
.admin-tab.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow); }

.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.tag-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
}
.tag-del {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text3);
  font-size: 14px;
  line-height: 1;
  padding: 0;
}
.tag-del:hover { color: var(--danger); }
.tag-color {
  width: 10px; height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}
.add-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.add-row input {
  flex: 1;
  padding: 9px 12px;
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--surface2);
  color: var(--text);
  outline: none;
}
.add-row input:focus { border-color: var(--accent); }
.add-row button {
  padding: 9px 16px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.add-row input[type="color"] {
  width: 40px;
  padding: 4px;
  border-radius: 8px;
  cursor: pointer;
}

/* ─── LEGEND ─── */
.legend-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text2);
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 3px;
}

/* ─── AUTH LOCK INPUT MODAL ─── */
#authModal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 800;
  display: none;
  align-items: center;
  justify-content: center;
}
#authModal .auth-card {
  background: var(--surface);
  border-radius: 14px;
  padding: 28px 32px;
  text-align: center;
  min-width: 280px;
  box-shadow: var(--shadow2);
}
#authModal h4 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
#authModal p { color: var(--text3); font-size: 12px; margin-bottom: 18px; }
#authModal input {
  width: 100%;
  padding: 12px;
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  text-align: center;
  font-size: 18px;
  letter-spacing: 6px;
  outline: none;
  margin-bottom: 12px;
  font-family: 'Noto Sans KR', sans-serif;
}
#authModal input:focus { border-color: var(--accent); }
#authModal input.shake { animation: shake 0.4s ease; border-color: var(--danger); }
#authModal .err { color: var(--danger); font-size: 11px; margin-bottom: 8px; min-height: 16px; }
#authModal .auth-btns { display: flex; gap: 8px; }
#authModal .auth-btns button {
  flex: 1; padding: 10px;
  border-radius: 8px; border: none;
  font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
.auth-ok { background: var(--accent); color: #fff; }
.auth-cancel { background: var(--surface2); border: 1.5px solid var(--border2) !important; color: var(--text2); }

@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}

/* ─── ENTRIES LIST IN MODAL ─── */
.entry-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; max-height: 200px; overflow-y: auto; }
.entry-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
}
.entry-item .e-info { display: flex; flex-direction: column; gap: 2px; }
.entry-item .e-name { font-weight: 700; }
.entry-item .e-type { color: var(--text3); font-size: 11px; }
.entry-del {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text3);
  font-size: 16px;
  padding: 0 4px;
  line-height: 1;
}
.entry-del:hover { color: var(--danger); }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #1a1f2e;
  color: #fff;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─── RESPONSIVE ─── */
@media (max-width: 900px) {
  #calArea { width: 100%; }
  #tableArea { display: none; }
}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-icon">🔐</div>
    <h2>연차 · 반차 현황판</h2>
    <p>비밀번호를 입력하세요</p>
    <input type="password" id="lockPw" maxlength="10" placeholder="••••" autocomplete="off"
      onkeydown="if(event.key==='Enter') tryUnlock()">
    <button onclick="tryUnlock()">입력</button>
    <div class="err" id="lockErr"></div>
    <button class="readonly-btn btn" onclick="enterReadOnly()">읽기 전용으로 보기</button>
  </div>
</div>

<!-- HEADER -->
<div id="header" style="display:none">
  <div class="logo">연차<span>·</span>반차 현황판</div>
  <span id="roBadge" class="badge-ro" style="display:none">읽기 전용</span>
  <nav>
    <button onclick="openAdmin()" id="adminBtn">⚙️ 관리</button>
    <button onclick="openAuth('lock')">🔒 잠금</button>
  </nav>
</div>

<!-- AUTH MODAL -->
<div id="authModal">
  <div class="auth-card">
    <h4>🔑 인증 필요</h4>
    <p id="authPurpose">비밀번호를 입력하세요</p>
    <input type="password" id="authPw" maxlength="10" placeholder="••••" autocomplete="off"
      onkeydown="if(event.key==='Enter') confirmAuth()">
    <div class="err" id="authErr"></div>
    <div class="auth-btns">
      <button class="auth-cancel" onclick="cancelAuth()">취소</button>
      <button class="auth-ok" onclick="confirmAuth()">확인</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <div id="sidebar" id="sidebar"></div>

  <!-- MAIN -->
  <div id="main">
    <!-- CALENDAR -->
    <div id="calArea">
      <div class="cal-header">
        <h2 id="calTitle"></h2>
        <div class="sub" id="calSub"></div>
      </div>
      <div class="legend-bar" id="legend"></div>
      <div class="cal-scroll">
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

    <!-- TABLE -->
    <div id="tableArea">
      <div class="tbl-header">
        <div>
          <h3 id="tblTitle"></h3>
          <div class="sub">연차=1일, 반차=0.5일 기준 집계</div>
        </div>
      </div>
      <div class="tbl-scroll">
        <table id="leaveTable">
          <thead id="tblHead"></thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- DATE CLICK MODAL -->
<div class="modal-overlay" id="dateModal" style="display:none" onclick="if(event.target===this&&!isReadOnly)closeDateModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeDateModal()">×</button>
    <h3 id="modalDateTitle"></h3>
    <div class="modal-sub" id="modalDateSub"></div>

    <!-- existing entries -->
    <div class="field-group" id="existingGroup" style="display:none">
      <div class="field-label">등록된 휴가</div>
      <div class="entry-list" id="entryList"></div>
    </div>

    <!-- add new -->
    <div id="addSection">
      <div class="field-group">
        <div class="field-label">직원 선택</div>
        <div class="input-row">
          <input list="empList" id="empInput" placeholder="이름 선택 또는 직접 입력">
          <datalist id="empList"></datalist>
        </div>
      </div>
      <div class="field-group">
        <div class="field-label">휴가 유형</div>
        <div class="chip-select" id="typeChips"></div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDateModal()">닫기</button>
      <button class="btn btn-primary" onclick="saveEntry()" id="saveBtn">저장</button>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="modal-overlay" id="adminModal" style="display:none" onclick="if(event.target===this)closeAdmin()">
  <div class="modal" style="min-width:440px">
    <button class="modal-close" onclick="closeAdmin()">×</button>
    <h3>관리자 설정</h3>
    <div class="modal-sub">직원 및 휴가 유형을 관리합니다</div>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="adminTab(0)">👤 직원 관리</button>
      <button class="admin-tab" onclick="adminTab(1)">📋 유형 관리</button>
    </div>
    <!-- employee tab -->
    <div id="adminEmp">
      <div class="tag-list" id="empTagList"></div>
      <div class="add-row">
        <input type="text" id="newEmpName" placeholder="직원 이름 입력">
        <input type="color" id="newEmpColor" value="#4dabf7" title="색상 선택">
        <button onclick="addEmployee()">추가</button>
      </div>
    </div>
    <!-- type tab -->
    <div id="adminType" style="display:none">
      <div class="tag-list" id="typeTagList"></div>
      <div class="add-row">
        <input type="text" id="newTypeName" placeholder="유형 이름 입력 (예: 특별휴가)">
        <button onclick="addLeaveType()">추가</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── STATE ───
const PW = '4114';
let isReadOnly = false;
let isUnlocked = false;
let authCallback = null;
let authPurposeKey = '';

const MONTHS = ['4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const MONTH_NUMS = [4,5,6,7,8,9,10,11,12];
const YEAR = 2026;
let currentMonth = 4;

// Leave type value (연차=1, 반차=0.5)
const TYPE_VALUE = { '연차': 1, '오전반휴': 0.5, '오후반휴': 0.5 };

function loadData() {
  try {
    const d = localStorage.getItem('leaveData_v2');
    return d ? JSON.parse(d) : null;
  } catch { return null; }
}
function saveData(d) {
  localStorage.setItem('leaveData_v2', JSON.stringify(d));
}

let DB = loadData() || {
  employees: [
    {name:'이상균', color:'#e64980'},
    {name:'김기우', color:'#7048e8'},
    {name:'김영선', color:'#1971c2'},
    {name:'공규식', color:'#0ca678'},
    {name:'김동현', color:'#e67700'},
    {name:'최경수', color:'#c92a2a'},
    {name:'김창호', color:'#5c7cfa'},
    {name:'이승범', color:'#20c997'},
    {name:'황태준', color:'#f76707'},
    {name:'송상율', color:'#ae3ec9'},
    {name:'이지혜', color:'#5c940d'},
    {name:'이지현', color:'#1098ad'},
    {name:'장명희', color:'#d6336c'},
  ],
  leaveTypes: ['연차','오전반휴','오후반휴'],
  entries: {} // { 'YYYY-MM-DD': [{name, type}] }
};

// selected type in modal
let selType = '';
let selDate = '';

// ─── LOCK ───
function tryUnlock() {
  const v = document.getElementById('lockPw').value;
  if (v === PW) {
    isReadOnly = false;
    isUnlocked = true;
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('header').style.display = 'flex';
    document.getElementById('app').style.display = 'flex';
    init();
  } else {
    const el = document.getElementById('lockPw');
    el.classList.add('shake');
    setTimeout(() => el.classList.remove('shake'), 500);
    document.getElementById('lockErr').textContent = '비밀번호가 틀렸습니다';
  }
}
function enterReadOnly() {
  isReadOnly = true;
  isUnlocked = true;
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('roBadge').style.display = 'inline';
  document.getElementById('adminBtn').style.display = 'none';
  init();
}

// ─── AUTH MODAL ───
function openAuth(purpose, cb) {
  if (purpose === 'lock') {
    // re-lock
    document.getElementById('header').style.display = 'none';
    document.getElementById('app').style.display = 'none';
    document.getElementById('lockScreen').style.display = 'flex';
    document.getElementById('lockPw').value = '';
    document.getElementById('lockErr').textContent = '';
    return;
  }
  authCallback = cb;
  document.getElementById('authPurpose').textContent = '이 작업을 위해 비밀번호를 입력하세요';
  document.getElementById('authPw').value = '';
  document.getElementById('authErr').textContent = '';
  document.getElementById('authModal').style.display = 'flex';
  setTimeout(() => document.getElementById('authPw').focus(), 100);
}
function confirmAuth() {
  const v = document.getElementById('authPw').value;
  if (v === PW) {
    document.getElementById('authModal').style.display = 'none';
    if (authCallback) authCallback();
  } else {
    const el = document.getElementById('authPw');
    el.classList.add('shake');
    setTimeout(() => el.classList.remove('shake'), 500);
    document.getElementById('authErr').textContent = '비밀번호가 틀렸습니다';
  }
}
function cancelAuth() {
  document.getElementById('authModal').style.display = 'none';
  authCallback = null;
}

// ─── INIT ───
function init() {
  renderSidebar();
  renderAll();
}

// ─── SIDEBAR ───
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  MONTH_NUMS.forEach(m => {
    const d = document.createElement('div');
    d.className = 'month-tab' + (m === currentMonth ? ' active' : '');
    d.innerHTML = `<span class="m-num">${m}</span><span class="m-txt">월</span>`;
    d.onclick = () => { currentMonth = m; renderSidebar(); renderAll(); };
    sb.appendChild(d);
  });
}

// ─── RENDER ALL ───
function renderAll() {
  renderLegend();
  renderCal();
  renderTable();
}

// ─── LEGEND ───
function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = DB.employees.map(e =>
    `<div class="legend-item"><div class="legend-dot" style="background:${e.color}"></div>${e.name}</div>`
  ).join('');
}

// ─── CALENDAR ───
function renderCal() {
  const m = currentMonth;
  document.getElementById('calTitle').textContent = `${YEAR}년 ${m}월`;
  const monthEntries = getMonthEntries(m);
  const total = Object.values(monthEntries).flat().length;
  document.getElementById('calSub').textContent = `총 ${total}건의 휴가가 등록되어 있습니다`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const days = ['일','월','화','수','목','금','토'];
  days.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const first = new Date(YEAR, m-1, 1);
  const lastDay = new Date(YEAR, m, 0).getDate();
  const startDow = first.getDay(); // 0=sun

  const today = new Date();

  // empty cells
  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= lastDay; d++) {
    const key = dateKey(YEAR, m, d);
    const entries = DB.entries[key] || [];
    const dow = new Date(YEAR, m-1, d).getDay();
    const isToday = today.getFullYear()===YEAR && today.getMonth()===m-1 && today.getDate()===d;

    const cell = document.createElement('div');
    cell.className = 'cal-cell'
      + (isToday ? ' today' : '')
      + (dow === 0 ? ' weekend-sun' : '')
      + (dow === 6 ? ' weekend-sat' : '');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    // chips
    const chipsEl = document.createElement('div');
    chipsEl.className = 'cell-chips';
    const show = entries.slice(0, 3);
    const rest = entries.length - show.length;
    show.forEach(e => {
      const emp = DB.employees.find(x => x.name === e.name);
      const color = emp ? emp.color : '#aaa';
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.style.background = color;
      chip.title = `${e.name} - ${e.type}`;
      // abbreviate type
      const typeAbbr = e.type === '연차' ? '연' : e.type === '오전반휴' ? '오전' : e.type === '오후반휴' ? '오후' : e.type.slice(0,2);
      chip.textContent = `${e.name.slice(0,1)} ${typeAbbr}`;
      chipsEl.appendChild(chip);
    });
    if (rest > 0) {
      const more = document.createElement('span');
      more.className = 'more-chip';
      more.textContent = `+${rest}`;
      chipsEl.appendChild(more);
    }
    cell.appendChild(chipsEl);

    cell.onclick = () => openDateModal(key, d, m);
    grid.appendChild(cell);
  }
}

function dateKey(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function getMonthEntries(m) {
  const result = {};
  const lastDay = new Date(YEAR, m, 0).getDate();
  for (let d = 1; d <= lastDay; d++) {
    const k = dateKey(YEAR, m, d);
    if (DB.entries[k] && DB.entries[k].length > 0) result[k] = DB.entries[k];
  }
  return result;
}

// ─── TABLE ───
function renderTable() {
  const m = currentMonth;
  document.getElementById('tblTitle').textContent = `${m}월 직원별 현황`;

  const lastDay = new Date(YEAR, m, 0).getDate();
  const dates = [];
  for (let d = 1; d <= lastDay; d++) dates.push(d);

  // head
  const thead = document.getElementById('tblHead');
  thead.innerHTML = `<tr>
    <th class="name-col">이름</th>
    ${dates.map(d => {
      const dow = new Date(YEAR, m-1, d).getDay();
      const cls = dow===0?'style="color:#e03131"':dow===6?'style="color:#3b5bdb"':'';
      return `<th ${cls}>${d}</th>`;
    }).join('')}
    <th class="sum-col">월계</th>
    <th class="sum-col">누적</th>
  </tr>`;

  // body
  const tbody = document.getElementById('tblBody');
  tbody.innerHTML = '';

  let colTotals = new Array(lastDay).fill(0);
  let grandMonthTotal = 0;

  DB.employees.forEach(emp => {
    const tr = document.createElement('tr');
    let monthSum = 0;

    // name
    const nameTd = document.createElement('td');
    nameTd.className = 'name-col';
    nameTd.textContent = emp.name;
    tr.appendChild(nameTd);

    // each day
    for (let d = 1; d <= lastDay; d++) {
      const key = dateKey(YEAR, m, d);
      const empEntries = (DB.entries[key] || []).filter(x => x.name === emp.name);
      const td = document.createElement('td');
      td.className = 'tbl-cell';
      if (empEntries.length > 0) {
        empEntries.forEach(e => {
          const badge = document.createElement('span');
          badge.className = 'tbl-badge';
          badge.style.background = emp.color;
          badge.textContent = e.type === '연차' ? '연' : e.type === '오전반휴' ? '오전' : e.type === '오후반휴' ? '오후' : e.type.slice(0,2);
          badge.title = e.type;
          td.appendChild(badge);
          const val = getTypeValue(e.type);
          monthSum += val;
          colTotals[d-1] += val;
          grandMonthTotal += val;
        });
      }
      tr.appendChild(td);
    }

    // cumulative (all months)
    let cumSum = 0;
    MONTH_NUMS.forEach(cm => {
      const cLast = new Date(YEAR, cm, 0).getDate();
      for (let cd = 1; cd <= cLast; cd++) {
        const ck = dateKey(YEAR, cm, cd);
        (DB.entries[ck] || []).filter(x => x.name === emp.name).forEach(e => {
          cumSum += getTypeValue(e.type);
        });
      }
    });

    const monthTd = document.createElement('td');
    monthTd.className = 'sum-col';
    monthTd.textContent = monthSum > 0 ? formatDays(monthSum) : '-';
    tr.appendChild(monthTd);

    const cumTd = document.createElement('td');
    cumTd.className = 'sum-col';
    cumTd.textContent = cumSum > 0 ? formatDays(cumSum) : '-';
    cumTd.style.color = '#e03131';
    tr.appendChild(cumTd);

    tbody.appendChild(tr);
  });

  // total row
  const totalTr = document.createElement('tr');
  totalTr.className = 'total-row';
  const totalName = document.createElement('td');
  totalName.className = 'name-col';
  totalName.textContent = '합계';
  totalTr.appendChild(totalName);
  for (let d = 0; d < lastDay; d++) {
    const td = document.createElement('td');
    td.textContent = colTotals[d] > 0 ? formatDays(colTotals[d]) : '';
    totalTr.appendChild(td);
  }
  const totalSum = document.createElement('td');
  totalSum.className = 'sum-col';
  totalSum.textContent = formatDays(grandMonthTotal);
  totalTr.appendChild(totalSum);
  const totalCum = document.createElement('td');
  totalCum.className = 'sum-col';
  totalCum.textContent = '';
  totalTr.appendChild(totalCum);
  tbody.appendChild(totalTr);
}

function getTypeValue(type) {
  if (type === '연차') return 1;
  if (type === '오전반휴' || type === '오후반휴') return 0.5;
  return 0.5; // custom types default to 0.5
}
function formatDays(v) {
  return v % 1 === 0 ? v + '일' : v + '일';
}

// ─── DATE MODAL ───
function openDateModal(key, d, m) {
  selDate = key;
  selType = DB.leaveTypes[0] || '';
  const dayNames = ['일','월','화','수','목','금','토'];
  const dow = new Date(YEAR, m-1, d).getDay();
  document.getElementById('modalDateTitle').textContent = `${YEAR}년 ${m}월 ${d}일 (${dayNames[dow]})`;
  document.getElementById('modalDateSub').textContent = isReadOnly ? '읽기 전용 모드입니다' : '휴가를 등록하거나 삭제할 수 있습니다';

  // existing entries
  renderEntryList(key);

  // employee datalist
  const dl = document.getElementById('empList');
  dl.innerHTML = DB.employees.map(e => `<option value="${e.name}">`).join('');
  document.getElementById('empInput').value = '';

  // type chips
  renderTypeChips();

  // show/hide add section
  document.getElementById('addSection').style.display = isReadOnly ? 'none' : '';
  document.getElementById('saveBtn').style.display = isReadOnly ? 'none' : '';

  document.getElementById('dateModal').style.display = 'flex';
}

function renderEntryList(key) {
  const entries = DB.entries[key] || [];
  const group = document.getElementById('existingGroup');
  const list = document.getElementById('entryList');
  if (entries.length === 0) { group.style.display = 'none'; return; }
  group.style.display = '';
  list.innerHTML = '';
  entries.forEach((e, i) => {
    const emp = DB.employees.find(x => x.name === e.name);
    const color = emp ? emp.color : '#aaa';
    const item = document.createElement('div');
    item.className = 'entry-item';
    item.innerHTML = `
      <div class="e-info">
        <span class="e-name" style="color:${color}">${e.name}</span>
        <span class="e-type">${e.type}</span>
      </div>
      ${!isReadOnly ? `<button class="entry-del" onclick="deleteEntry('${key}',${i})">×</button>` : ''}
    `;
    list.appendChild(item);
  });
}

function renderTypeChips() {
  const el = document.getElementById('typeChips');
  el.innerHTML = '';
  DB.leaveTypes.forEach(t => {
    const btn = document.createElement('button');
    btn.textContent = t;
    if (t === selType) btn.classList.add('sel');
    if (btn.classList.contains('sel')) {
      const colors = { '연차':'#3b5bdb','오전반휴':'#e67700','오후반휴':'#2f9e44' };
      btn.style.background = colors[t] || '#555';
    }
    btn.onclick = () => { selType = t; renderTypeChips(); };
    el.appendChild(btn);
  });
}

function closeDateModal() {
  document.getElementById('dateModal').style.display = 'none';
}

function saveEntry() {
  if (isReadOnly) { showToast('읽기 전용 모드입니다'); return; }
  const name = document.getElementById('empInput').value.trim();
  if (!name) { showToast('직원 이름을 입력하세요'); return; }
  if (!selType) { showToast('휴가 유형을 선택하세요'); return; }

  const doSave = () => {
    if (!DB.entries[selDate]) DB.entries[selDate] = [];
    // check dup
    const dup = DB.entries[selDate].find(e => e.name === name && e.type === selType);
    if (dup) { showToast('이미 등록된 항목입니다'); return; }
    DB.entries[selDate].push({ name, type: selType });
    saveData(DB);
    renderEntryList(selDate);
    renderAll();
    document.getElementById('empInput').value = '';
    showToast(`${name} - ${selType} 등록 완료`);
  };

  // if read-only mode was bypassed, require auth
  doSave();
}

function deleteEntry(key, idx) {
  if (isReadOnly) return;
  const doDelete = () => {
    DB.entries[key].splice(idx, 1);
    if (DB.entries[key].length === 0) delete DB.entries[key];
    saveData(DB);
    renderEntryList(key);
    renderAll();
    showToast('삭제되었습니다');
  };
  doDelete();
}

// ─── ADMIN ───
let adminTabIdx = 0;
function openAdmin() {
  if (isReadOnly) { showToast('읽기 전용 모드입니다'); return; }
  adminTabIdx = 0;
  renderAdminEmp();
  renderAdminType();
  document.getElementById('adminModal').style.display = 'flex';
  adminTab(0);
}
function closeAdmin() {
  document.getElementById('adminModal').style.display = 'none';
}
function adminTab(idx) {
  adminTabIdx = idx;
  document.querySelectorAll('.admin-tab').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.getElementById('adminEmp').style.display = idx === 0 ? '' : 'none';
  document.getElementById('adminType').style.display = idx === 1 ? '' : 'none';
}
function renderAdminEmp() {
  const el = document.getElementById('empTagList');
  el.innerHTML = '';
  DB.employees.forEach((e, i) => {
    const item = document.createElement('div');
    item.className = 'tag-item';
    item.innerHTML = `<div class="tag-color" style="background:${e.color}"></div>${e.name}
      <button class="tag-del" onclick="removeEmployee(${i})">×</button>`;
    el.appendChild(item);
  });
}
function renderAdminType() {
  const el = document.getElementById('typeTagList');
  el.innerHTML = '';
  DB.leaveTypes.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'tag-item';
    item.innerHTML = `${t}<button class="tag-del" onclick="removeLeaveType(${i})">×</button>`;
    el.appendChild(item);
  });
}
function addEmployee() {
  const name = document.getElementById('newEmpName').value.trim();
  const color = document.getElementById('newEmpColor').value;
  if (!name) return;
  if (DB.employees.find(e => e.name === name)) { showToast('이미 존재하는 직원입니다'); return; }
  DB.employees.push({ name, color });
  saveData(DB);
  document.getElementById('newEmpName').value = '';
  renderAdminEmp();
  renderAll();
  showToast(`${name} 추가됨`);
}
function removeEmployee(i) {
  if (!confirm(`${DB.employees[i].name}을(를) 삭제하시겠습니까?`)) return;
  DB.employees.splice(i, 1);
  saveData(DB);
  renderAdminEmp();
  renderAll();
  showToast('삭제되었습니다');
}
function addLeaveType() {
  const name = document.getElementById('newTypeName').value.trim();
  if (!name) return;
  if (DB.leaveTypes.includes(name)) { showToast('이미 존재하는 유형입니다'); return; }
  DB.leaveTypes.push(name);
  saveData(DB);
  document.getElementById('newTypeName').value = '';
  renderAdminType();
  showToast(`${name} 추가됨`);
}
function removeLeaveType(i) {
  if (DB.leaveTypes.length <= 1) { showToast('최소 1개의 유형은 필요합니다'); return; }
  DB.leaveTypes.splice(i, 1);
  saveData(DB);
  renderAdminType();
  showToast('삭제되었습니다');
}

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── KEYBOARD ───
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('dateModal').style.display = 'none';
    document.getElementById('adminModal').style.display = 'none';
  }
});
</script>
</body>
