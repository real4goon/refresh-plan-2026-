<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>연차 · 반차 현황판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Gmarket+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f3f8; --sur:#fff; --sur2:#f7f9fc;
  --bd:#e4e9f2; --bd2:#cdd4e4;
  --tx:#1a2236; --tx2:#546080; --tx3:#96a3bc;
  --ac:#2563eb; --ach:#1d4ed8; --acl:#eff4ff;
  --dn:#dc2626; --hd:#0f1526; --sb:#151d35;
  --r:10px; --r2:7px;
  --sh:0 1px 8px rgba(0,0,0,.07);
  --sh2:0 8px 32px rgba(0,0,0,.13);
  --hh:56px; --sw:68px; --mbh:62px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:10px}

/* ── LOCK ── */
#lock{position:fixed;inset:0;z-index:9999;background:var(--hd);display:flex;align-items:center;justify-content:center}
#lock::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 35%,rgba(37,99,235,.18) 0%,transparent 55%),radial-gradient(ellipse at 75% 70%,rgba(124,58,237,.10) 0%,transparent 55%);pointer-events:none}
.lcard{position:relative;width:min(340px,90vw);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:22px;padding:48px 40px;text-align:center;backdrop-filter:blur(20px);box-shadow:0 32px 80px rgba(0,0,0,.45)}
.llogo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
.lico{width:38px;height:38px;background:var(--ac);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.llogo span{font-family:'Gmarket Sans',sans-serif;font-size:18px;font-weight:700;color:#fff}
.lcard p{color:rgba(255,255,255,.45);font-size:13px;margin-bottom:20px}
.lpw{width:100%;padding:13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:var(--r);color:#fff;font-size:26px;letter-spacing:14px;text-align:center;outline:none;font-family:inherit;transition:border-color .2s;margin-bottom:12px}
.lpw:focus{border-color:var(--ac)}
.lpw.shake{animation:shake .36s ease;border-color:#f87171!important}
.lbtn{width:100%;padding:13px;background:var(--ac);border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,transform .1s}
.lbtn:hover{background:var(--ach)}
.lbtn:active{transform:scale(.98)}
.lerr{min-height:16px;font-size:12px;color:#f87171;margin-top:8px}

/* ── HEADER ── */
#hdr{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--hd);display:none;align-items:center;gap:10px;z-index:200;border-bottom:1px solid rgba(255,255,255,.05)}
.hinner{display:flex;align-items:center;width:100%;padding:0 16px 0 calc(var(--sw)+12px)}
.hlogo{display:flex;align-items:center;gap:8px}
.hico{width:26px;height:26px;background:var(--ac);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
.hlogo span{font-family:'Gmarket Sans',sans-serif;font-size:14px;font-weight:700;color:#fff}
.hright{margin-left:auto;display:flex;gap:6px;align-items:center}
.hbtn{display:flex;align-items:center;gap:4px;padding:6px 11px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.7);border-radius:var(--r2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.09);color:#fff}
.hbtn.acc{background:var(--ac);border-color:var(--ac);color:#fff}
.sync-area{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.35)}
.sdot{width:6px;height:6px;border-radius:50%;background:#96a3bc;transition:background .3s;flex-shrink:0}
.sdot.ok{background:#4ade80}.sdot.er{background:#f87171}.sdot.ld{background:#fbbf24;animation:pulse 1s infinite}

/* ── SIDEBAR ── */
#sb{position:fixed;top:var(--hh);left:0;width:var(--sw);height:calc(100vh - var(--hh));background:var(--sb);display:none;flex-direction:column;overflow-y:auto;padding:10px 0;gap:2px;z-index:100;border-right:1px solid rgba(255,255,255,.04)}
.mtab{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;margin:0 6px;border-radius:9px;cursor:pointer;transition:all .15s;gap:1px}
.mtab .mn{font-family:'Gmarket Sans',sans-serif;font-size:17px;font-weight:700;color:rgba(255,255,255,.3);line-height:1}
.mtab .ml{font-size:9px;color:rgba(255,255,255,.18)}
.mtab:hover .mn{color:rgba(255,255,255,.7)}
.mtab.on{background:rgba(37,99,235,.22)}
.mtab.on .mn,.mtab.on .ml{color:#93b4ff}

/* ── APP ── */
#app{display:none;padding-top:var(--hh);padding-left:var(--sw);height:100vh;overflow:hidden}
#main{display:flex;height:100%;overflow:hidden}

/* ── CALENDAR PANEL ── */
#calP{width:510px;flex-shrink:0;display:flex;flex-direction:column;background:var(--sur);border-right:1px solid var(--bd);height:100%;overflow:hidden}
.ctop{padding:16px 18px 12px;border-bottom:1px solid var(--bd);flex-shrink:0}
.ctop h2{font-family:'Gmarket Sans',sans-serif;font-size:20px;font-weight:700}
.ctop .sub{color:var(--tx3);font-size:12px;margin-top:3px}
.lgbar{padding:8px 14px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--bd);background:var(--sur2);flex-shrink:0}
.lgit{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2)}
.lgdot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.cscroll{flex:1;overflow-y:auto;padding:12px 14px}
.cdow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.dcell{text-align:center;font-size:11px;font-weight:700;padding:4px 0;color:var(--tx3)}
.dcell:first-child{color:#ef4444}.dcell:last-child{color:var(--ac)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.ccell{border-radius:6px;border:1.5px solid transparent;cursor:pointer;background:var(--sur2);min-height:76px;display:flex;flex-direction:column;transition:all .12s;overflow:hidden}
.ccell:hover{border-color:var(--bd2);box-shadow:var(--sh);transform:translateY(-1px)}
.ccell.today{border-color:var(--ac)}.ccell.today .dno{color:var(--ac)}
.ccell.emp{background:transparent;border:none;cursor:default}.ccell.emp:hover{transform:none;box-shadow:none}
.ccell.sun .dno{color:#ef4444}.ccell.sat .dno{color:var(--ac)}
.dno{font-size:11px;font-weight:700;padding:4px 5px 2px;color:var(--tx);line-height:1}
.cchips{padding:0 3px 3px;display:flex;flex-direction:row;flex-wrap:wrap;gap:2px;overflow:hidden;align-content:flex-start}
.cchip{font-size:8px;font-weight:700;padding:1px 3px;border-radius:3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;max-width:100%}
.cmore{font-size:8px;color:var(--tx3);padding:0 3px}

/* ── TABLE PANEL ── */
#tblP{flex:1;display:flex;flex-direction:column;background:var(--sur);overflow:hidden}
.ttop{padding:16px 18px 12px;border-bottom:1px solid var(--bd);flex-shrink:0}
.ttop h3{font-family:'Gmarket Sans',sans-serif;font-size:16px;font-weight:700}
.ttop .sub{color:var(--tx3);font-size:11px;margin-top:3px}
.tscroll{flex:1;overflow:auto}
#ltbl{border-collapse:collapse;width:100%;min-width:700px;font-size:11px}
#ltbl th,#ltbl td{border:1px solid var(--bd);text-align:center;white-space:nowrap}
#ltbl thead th{background:#f1f5fb;font-weight:700;font-size:10px;color:var(--tx2);padding:6px 5px;position:sticky;top:0;z-index:2}
#ltbl thead th.fc{left:0;z-index:3;min-width:72px;border-right:2px solid var(--bd2)}
#ltbl tbody td.fc{position:sticky;left:0;background:var(--sur);font-weight:700;font-size:12px;padding:5px 9px;z-index:1;border-right:2px solid var(--bd2)}
#ltbl tbody tr:hover td{background:#f5f8ff}
#ltbl tbody tr:hover td.fc{background:#f5f8ff}
.tbdg{display:inline-block;padding:2px 5px;border-radius:4px;font-size:9px;font-weight:800;color:#fff;margin:1px}
.sc{background:#eff4ff!important;color:var(--ac)!important;font-weight:800!important}
.sc2{background:#fff5f5!important;color:#dc2626!important;font-weight:800!important}
.sumr td{background:#f1f5fb!important;font-weight:700!important;color:var(--tx2)!important}
.sun-h{color:#ef4444}.sat-h{color:var(--ac)}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(10,15,30,.55);backdrop-filter:blur(5px);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--sur);border-radius:16px;padding:26px 28px;width:430px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:var(--sh2);position:relative}
.mlg{width:490px}
.modal h3{font-family:'Gmarket Sans',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px}
.msub{color:var(--tx3);font-size:12px;margin-bottom:18px}
.mcls{position:absolute;top:13px;right:13px;width:28px;height:28px;background:var(--sur2);border:1px solid var(--bd);border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:all .12s}
.mcls:hover{background:var(--bd)}
.flbl{font-size:10px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.fg{margin-bottom:16px}
.fi{width:100%;padding:9px 12px;border:1.5px solid var(--bd2);border-radius:var(--r2);font-size:13px;font-family:inherit;background:var(--sur2);color:var(--tx);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--ac)}
.tchips{display:flex;flex-wrap:wrap;gap:6px}
.tchip{padding:6px 12px;border:1.5px solid var(--bd2);border-radius:8px;background:var(--sur2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--tx2);transition:all .12s}
.tchip:hover{border-color:var(--ac);color:var(--ac)}
.tchip.sel{color:#fff!important;border-color:transparent!important}
.elist{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;max-height:240px;overflow-y:auto}
.eit{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:var(--sur2);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.eit .ei{display:flex;flex-direction:column}
.eit .en{font-weight:700;font-size:12px}
.eit .et{font-size:11px;color:var(--tx3)}
.edel{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:18px;padding:0 2px;line-height:1}
.edel:hover{color:var(--dn)}
.mft{display:flex;gap:8px;margin-top:18px}
.btn{flex:1;padding:11px;border-radius:var(--r2);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s}
.bpri{background:var(--ac);color:#fff}.bpri:hover{background:var(--ach)}
.bgho{background:var(--sur2);border:1.5px solid var(--bd2);color:var(--tx2)}.bgho:hover{background:var(--bd)}
.atabs{display:flex;gap:3px;margin-bottom:18px;background:var(--sur2);padding:3px;border-radius:9px}
.atab{flex:1;padding:7px 4px;border:none;background:transparent;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--tx3);transition:all .15s}
.atab.on{background:var(--sur);color:var(--ac);box-shadow:var(--sh)}
.tglist{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;min-height:34px}
.tg{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--sur2);border:1px solid var(--bd2);border-radius:7px;font-size:12px;font-weight:600}
.tgdot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.tgdel{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:15px;padding:0;line-height:1}
.tgdel:hover{color:var(--dn)}
.arow{display:flex;gap:6px;margin-top:6px}
.arow input[type=text]{flex:1;padding:8px 11px;border:1.5px solid var(--bd2);border-radius:var(--r2);font-size:13px;font-family:inherit;background:var(--sur2);color:var(--tx);outline:none}
.arow input[type=text]:focus{border-color:var(--ac)}
.arow input[type=color]{width:36px;padding:3px;border:1.5px solid var(--bd2);border-radius:var(--r2);cursor:pointer;background:var(--sur2)}
.arow button{padding:8px 14px;background:var(--ac);border:none;border-radius:var(--r2);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.arow button:hover{background:var(--ach)}
.cdivider{display:flex;align-items:center;gap:8px;margin:14px 0 10px}
.cdivider div{flex:1;height:1px;background:var(--bd)}
.cdivider span{font-size:10px;color:var(--tx3);white-space:nowrap}
.cus-note{font-size:11px;color:var(--tx3);margin-bottom:10px;line-height:1.7}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:#1a2236;color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .28s ease;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-left:3px solid #4ade80}.toast.er{border-left:3px solid #f87171}

/* ── LOADING ── */
#ldov{position:fixed;inset:0;background:rgba(255,255,255,.7);backdrop-filter:blur(3px);z-index:800;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spin{width:34px;height:34px;border:3px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
#ldov p{font-size:13px;color:var(--tx2)}

/* ══════════════════════════════
   MOBILE
══════════════════════════════ */
/* 모바일 하단 탭바 */
#mobNav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:var(--mbh);
  background:var(--hd);
  border-top:1px solid rgba(255,255,255,.08);
  z-index:300;
  align-items:center;
  padding:0 4px;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.mnbtn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;cursor:pointer;
  font-family:inherit;color:rgba(255,255,255,.38);
  transition:color .15s,background .15s;
  padding:6px 0;border-radius:10px;margin:4px 2px;
  -webkit-tap-highlight-color:transparent;
}
.mnbtn.on{color:#93b4ff;background:rgba(37,99,235,.15)}
.mnbtn .mni{font-size:19px;line-height:1}
.mnbtn .mnl{font-size:9px;font-weight:700;letter-spacing:.3px}

/* 모바일 월 선택 가로 스크롤 */
#mobMon{
  display:none;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:8px 12px 9px;gap:6px;
  border-bottom:1px solid var(--bd);
  background:var(--sur);flex-shrink:0;
  scrollbar-width:none;
}
#mobMon::-webkit-scrollbar{display:none}
.mmbtn{
  flex-shrink:0;padding:5px 13px;border-radius:20px;
  border:1.5px solid var(--bd2);background:var(--sur2);
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:inherit;color:var(--tx2);white-space:nowrap;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.mmbtn.on{background:var(--ac);border-color:var(--ac);color:#fff}

@media (max-width:768px){
  :root{--hh:50px;--sw:0px}

  /* 헤더 */
  .hinner{padding:0 12px!important}
  .hlogo span{font-size:13px!important}
  .sync-area{display:none!important}
  #hSyncBtn{display:none!important}
  .hbtn{padding:5px 9px!important;font-size:11px!important}

  /* 사이드바 숨김 */
  #sb{display:none!important}

  /* 앱 레이아웃 */
  #app{
    padding-left:0!important;
    padding-bottom:var(--mbh)!important;
    height:100vh!important;
    overflow:hidden!important;
  }
  #main{flex-direction:column!important;height:100%!important;overflow:hidden!important}

  /* 캘린더 */
  #calP{
    width:100%!important;height:100%!important;
    border-right:none!important;
    display:none!important;
  }
  #calP.act{display:flex!important}

  /* 테이블 */
  #tblP{
    width:100%!important;height:100%!important;
    display:none!important;
  }
  #tblP.act{display:flex!important}

  /* 셀 크기 */
  .ccell{min-height:54px!important}
  .cchip{font-size:7px!important;padding:1px 2px!important}
  .dno{font-size:10px!important;padding:3px 4px 1px!important}
  .cscroll{padding:8px 9px!important}
  .cgrid{gap:2px!important}
  .ctop{padding:10px 13px 8px!important}
  .ctop h2{font-size:16px!important}
  .lgbar{padding:6px 11px!important;gap:4px!important}
  .lgit{font-size:10px!important}
  .ttop{padding:10px 13px 8px!important}
  .ttop h3{font-size:14px!important}

  /* 모달 → 하단 시트 */
  .ov{align-items:flex-end!important}
  .modal{
    width:100%!important;max-width:100%!important;
    border-radius:20px 20px 0 0!important;
    padding:20px 18px 28px!important;
    position:relative!important;
    max-height:88vh!important;
  }
  .mlg{width:100%!important}
  .modal h3{font-size:15px!important}

  /* 모바일 탭바 + 월바 표시 */
  #mobNav{display:flex!important}
  #mobMon{display:flex!important}

  /* toast 위치 (탭바 위) */
  .toast{bottom:calc(var(--mbh) + 10px)!important}
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div class="lcard">
    <div class="llogo"><div class="lico">📋</div><span>연차·반차 현황판</span></div>
    <p>비밀번호를 입력하세요</p>
    <input class="lpw" type="password" id="lpw" maxlength="8" placeholder="••••" autocomplete="off" autofocus>
    <button class="lbtn" onclick="tryUnlock()">로그인</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- HEADER -->
<div id="hdr">
  <div class="hinner">
    <div class="hlogo"><div class="hico">📋</div><span>연차·반차 현황판</span></div>
    <div class="hright">
      <div class="sync-area"><div class="sdot" id="sdot"></div><span id="stxt">-</span></div>
      <button class="hbtn acc" id="hSyncBtn" onclick="syncNow()">🔄 동기화</button>
      <button class="hbtn" onclick="openAdmin()">⚙️ 관리</button>
      <button class="hbtn" onclick="reLock()">🔒 잠금</button>
    </div>
  </div>
</div>

<!-- SIDEBAR (PC) -->
<div id="sb"></div>

<!-- APP -->
<div id="app">
  <div id="main">
    <!-- 캘린더 -->
    <div id="calP">
      <div class="ctop"><h2 id="ctitle"></h2><div class="sub" id="csub"></div></div>
      <div id="mobMon"></div>
      <div class="lgbar" id="lgbar"></div>
      <div class="cscroll">
        <div class="cdow" id="cdow"></div>
        <div class="cgrid" id="cgrid"></div>
      </div>
    </div>
    <!-- 현황표 -->
    <div id="tblP">
      <div class="ttop"><h3 id="ttitle"></h3><div class="sub">연차=1일 · 반차=0.5일 기준 집계</div></div>
      <div class="tscroll"><table id="ltbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
    </div>
  </div>
</div>

<!-- 모바일 하단 탭바 -->
<div id="mobNav">
  <button class="mnbtn on" id="mnb0" onclick="mobTab(0)"><span class="mni">📅</span><span class="mnl">캘린더</span></button>

<!-- LOADING -->
<div id="ldov"><div class="spin"></div><p id="ldmsg">처리 중...</p></div>
<div class="toast" id="toast"></div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbxyimPsM-AlL_k1bOfQQ7K2sptoph3JzIneVE0onNyPOfDcGRpiatNFI1oRSOE8Bog5cA/exec';
const PW='4114', ADMIN_PW='4041', YEAR=2026, MONTHS=[4,5,6,7,8,9,10,11,12];

const DEF={
  employees:[
    {name:'이상균',color:'#e11d48'},{name:'김기우',color:'#7c3aed'},
    {name:'김영선',color:'#1d4ed8'},{name:'공규식',color:'#059669'},
    {name:'김동현',color:'#d97706'},{name:'최경수',color:'#dc2626'},
    {name:'김창호',color:'#4f46e5'},{name:'이승범',color:'#0891b2'},
    {name:'황태준',color:'#ea580c'},{name:'송상율',color:'#9333ea'},
    {name:'이지혜',color:'#16a34a'},{name:'이지현',color:'#0d9488'},
    {name:'장명희',color:'#db2777'},
  ],
  leaveTypes:['연차','오전반휴','오후반휴'],
  customTypes:[],
  entries:{}
};

let DB=JSON.parse(JSON.stringify(DEF));
let curM=4, selTyp='', selDt='', selIsCustom=false, cusTarget='all';
let mobTabIdx=0;

/* ── GAS JSONP ── */
function jsonp(url){
  return new Promise((res,rej)=>{
    const cb='cb_'+Date.now();
    const s=document.createElement('script');
    const t=setTimeout(()=>{delete window[cb];s.remove();rej(new Error('timeout'))},10000);
    window[cb]=(d)=>{clearTimeout(t);delete window[cb];s.remove();res(d)};
    s.src=url+'&callback='+cb;
    s.onerror=()=>{clearTimeout(t);rej(new Error('error'))};
    document.body.appendChild(s);
  });
}
async function gasRead(){
  setSS('ld','불러오는 중...');
  try{
    const d=await jsonp(GAS+'?t='+Date.now());
    if(d&&d.employees)DB=d;
    else if(!d||!Object.keys(d).length)await gasWrite();
    if(!DB.customTypes)DB.customTypes=[];
    setSS('ok','동기화 완료 · '+nowT());return true;
  }catch(e){setSS('er','읽기 실패');toast('불러오기 실패: '+e.message,'er');return false;}
}
async function gasWrite(){
  setSS('ld','저장 중...');
  return new Promise(res=>{
    const cb='cbw_'+Date.now();
    const s=document.createElement('script');
    const payload=encodeURIComponent(JSON.stringify({pw:PW,data:DB}));
    const t=setTimeout(()=>{delete window[cb];s.remove();setSS('er','저장 실패');toast('시간 초과','er');res(false)},12000);
    window[cb]=(r)=>{
      clearTimeout(t);delete window[cb];s.remove();
      if(r&&r.ok){setSS('ok','저장 완료 · '+nowT());res(true);}
      else{setSS('er','저장 실패');toast('저장 실패: '+(r&&r.msg||'오류'),'er');res(false);}
    };
    s.src=GAS+'?action=write&payload='+payload+'&callback='+cb;
    s.onerror=()=>{clearTimeout(t);setSS('er','저장 실패');toast('네트워크 오류','er');res(false)};
    document.body.appendChild(s);
  });
}
async function syncNow(){
  showLD('최신 데이터 불러오는 중...');
  const ok=await gasRead();hideLD();
  if(ok){renderAll();toast('업데이트 완료','ok');}
}

/* ── SYNC STATUS ── */
function setSS(s,m){document.getElementById('sdot').className='sdot '+s;document.getElementById('stxt').textContent=m}
function nowT(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}

/* ── LOCK ── */
document.getElementById('lpw').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock()});
function tryUnlock(){
  if(document.getElementById('lpw').value===PW){
    document.getElementById('lock').style.display='none';
    document.getElementById('hdr').style.display='flex';
    document.getElementById('app').style.display='block';
    if(!isMob())document.getElementById('sb').style.display='flex';
    init();
  }else{
    const el=document.getElementById('lpw');
    el.classList.add('shake');setTimeout(()=>el.classList.remove('shake'),380);
    document.getElementById('lerr').textContent='비밀번호가 올바르지 않습니다';
  }
}
function reLock(){
  ['hdr','sb','app'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('lock').style.display='flex';
  document.getElementById('lpw').value='';
  document.getElementById('lerr').textContent='';
}

/* ── MOBILE ── */
function isMob(){return window.innerWidth<=768}
function mobTab(i){
  mobTabIdx=i;
  [0,1,2,3,4].forEach(j=>{const b=document.getElementById('mnb'+j);if(b)b.classList.toggle('on',j===i)});
  document.getElementById('calP').classList.toggle('act',i===0);
  document.getElementById('tblP').classList.toggle('act',i===1);
}
function applyMob(){
  if(isMob()){
    document.getElementById('calP').classList.add('act');
    document.getElementById('tblP').classList.remove('act');
    [0,1,2,3,4].forEach(j=>{const b=document.getElementById('mnb'+j);if(b)b.classList.toggle('on',j===0)});
    renderMobMon();
  }else{
    document.getElementById('calP').classList.remove('act');
    document.getElementById('tblP').classList.remove('act');
  }
}
function renderMobMon(){
  const bar=document.getElementById('mobMon');if(!bar)return;
  bar.innerHTML='';
  MONTHS.forEach(m=>{
    const b=document.createElement('button');
    b.className='mmbtn'+(m===curM?' on':'');
    b.textContent=m+'월';
    b.onclick=()=>{curM=m;renderMobMon();renderAll()};
    bar.appendChild(b);
  });
  setTimeout(()=>{const a=bar.querySelector('.on');if(a)a.scrollIntoView({inline:'center',behavior:'smooth'})},50);
}
window.addEventListener('resize',()=>{
  if(isMob()){document.getElementById('sb').style.display='none';renderMobMon();}
  else{document.getElementById('sb').style.display='flex';}
});

/* ── INIT ── */
async function init(){
  renderSB();
  applyMob();
  showLD('구글 시트에서 데이터를 불러오는 중...');
  await gasRead();hideLD();
  renderAll();
}

/* ── SIDEBAR ── */
function renderSB(){
  const sb=document.getElementById('sb');sb.innerHTML='';
  MONTHS.forEach(m=>{
    const d=document.createElement('div');
    d.className='mtab'+(m===curM?' on':'');
    d.innerHTML=`<span class="mn">${m}</span><span class="ml">월</span>`;
    d.onclick=()=>{curM=m;renderSB();renderAll()};
    sb.appendChild(d);
  });
}

/* ── RENDER ── */
function renderAll(){renderLg();renderCal();renderTbl();if(isMob())renderMobMon();}
function renderLg(){
  document.getElementById('lgbar').innerHTML=
    DB.employees.map(e=>`<div class="lgit"><div class="lgdot" style="background:${e.color}"></div>${e.name}</div>`).join('');
}

/* ── CALENDAR ── */
function dk(y,m,d){return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function nShort(n){return n.length>=3?n.slice(1):n}
function tShort(t){return t==='연차'?'연':t==='오전반휴'?'오전':t==='오후반휴'?'오후':t.slice(0,2)}
function tVal(t){
  if(t==='연차')return 1;
  if(t==='오전반휴'||t==='오후반휴')return .5;
  if(DB.customTypes&&DB.customTypes.includes(t))return 0;
  return .5;
}
function isCus(t){return DB.customTypes&&DB.customTypes.includes(t)}

function renderCal(){
  const m=curM;
  document.getElementById('ctitle').textContent=`${YEAR}년 ${m}월`;
  const cnt=Object.keys(DB.entries).filter(k=>k.startsWith(`${YEAR}-${String(m).padStart(2,'0')}-`)).reduce((a,k)=>a+(DB.entries[k]||[]).length,0);
  document.getElementById('csub').textContent=`총 ${cnt}건 등록`;
  document.getElementById('cdow').innerHTML=['일','월','화','수','목','금','토'].map(d=>`<div class="dcell">${d}</div>`).join('');
  const grid=document.getElementById('cgrid');grid.innerHTML='';
  const lastDay=new Date(YEAR,m,0).getDate();
  const startDow=new Date(YEAR,m-1,1).getDay();
  const today=new Date();
  for(let i=0;i<startDow;i++){const e=document.createElement('div');e.className='ccell emp';grid.appendChild(e);}
  for(let d=1;d<=lastDay;d++){
    const key=dk(YEAR,m,d);
    const ents=DB.entries[key]||[];
    const dow=new Date(YEAR,m-1,d).getDay();
    const isToday=today.getFullYear()===YEAR&&today.getMonth()===m-1&&today.getDate()===d;
    const cell=document.createElement('div');
    cell.className='ccell'+(isToday?' today':'')+(dow===0?' sun':dow===6?' sat':'');
    const dno=document.createElement('div');dno.className='dno';dno.textContent=d;cell.appendChild(dno);
    const chips=document.createElement('div');chips.className='cchips';
    const SHOW=isMob()?4:6;
    ents.slice(0,SHOW).forEach(e=>{
      const emp=DB.employees.find(x=>x.name===e.name);
      const c=isCus(e.type)?'#64748b':(emp?emp.color:'#999');
      const ch=document.createElement('div');ch.className='cchip';ch.style.background=c;
      ch.title=`${e.name} - ${e.type}`;
      ch.textContent=nShort(e.name)+' '+tShort(e.type);
      chips.appendChild(ch);
    });
    if(ents.length>SHOW){const more=document.createElement('div');more.className='cmore';more.textContent=`+${ents.length-SHOW}`;chips.appendChild(more)}
    cell.appendChild(chips);
    cell.onclick=()=>openDM(key,d,m);
    grid.appendChild(cell);
  }
}

/* ── TABLE ── */
function renderTbl(){
  const m=curM;
  document.getElementById('ttitle').textContent=`${m}월 직원별 현황`;
  const lastDay=new Date(YEAR,m,0).getDate();
  let hrow=`<tr><th class="fc">이름</th>`;
  for(let d=1;d<=lastDay;d++){const dow=new Date(YEAR,m-1,d).getDay();hrow+=`<th${dow===0?' class="sun-h"':dow===6?' class="sat-h"':''}>${d}</th>`;}
  hrow+=`<th class="sc">월계</th><th class="sc2">누적</th></tr>`;
  document.getElementById('thead').innerHTML=hrow;
  const tbody=document.getElementById('tbody');tbody.innerHTML='';
  const colT=new Array(lastDay).fill(0);
  DB.employees.forEach(emp=>{
    const tr=document.createElement('tr');
    const ntd=document.createElement('td');ntd.className='fc';ntd.textContent=emp.name;tr.appendChild(ntd);
    let mSum=0;
    for(let d=1;d<=lastDay;d++){
      const key=dk(YEAR,m,d);
      const ee=(DB.entries[key]||[]).filter(x=>x.name===emp.name);
      const td=document.createElement('td');td.style.padding='3px 2px';
      ee.forEach(e=>{
        const b=document.createElement('span');b.className='tbdg';
        b.style.background=isCus(e.type)?'#94a3b8':emp.color;
        b.textContent=tShort(e.type);b.title=e.type;
        td.appendChild(b);
        const v=tVal(e.type);mSum+=v;colT[d-1]+=v;
      });
      tr.appendChild(td);
    }
    let cSum=0;
    MONTHS.forEach(cm=>{const cl=new Date(YEAR,cm,0).getDate();for(let cd=1;cd<=cl;cd++){(DB.entries[dk(YEAR,cm,cd)]||[]).filter(x=>x.name===emp.name).forEach(e=>{cSum+=tVal(e.type)});}});
    const mtd=document.createElement('td');mtd.className='sc';mtd.textContent=fDay(mSum);tr.appendChild(mtd);
    const ctd=document.createElement('td');ctd.className='sc2';ctd.textContent=fDay(cSum);tr.appendChild(ctd);
    tbody.appendChild(tr);
  });
  const sr=document.createElement('tr');sr.className='sumr';
  const sn=document.createElement('td');sn.className='fc';sn.textContent='합계(인원)';sr.appendChild(sn);
  let gt=0;
  for(let d=0;d<lastDay;d++){
    // 인원 카운트 (날짜별 고유 직원 수, 커스텀 포함)
    const key2=dk(YEAR,m,d+1);
    const dayEnts=DB.entries[key2]||[];
    const uniqNames=new Set(dayEnts.map(e=>e.name));
    const cnt=uniqNames.size;
    const td=document.createElement('td');
    if(cnt>0){
      td.textContent=cnt+'명';
      if(cnt>=4){td.style.fontWeight='900';td.style.color='#dc2626';td.style.background='#fff5f5';}
    }
    sr.appendChild(td);gt+=colT[d];
  }
  const gtd=document.createElement('td');gtd.className='sc';gtd.textContent=fDay(gt);sr.appendChild(gtd);
  const gtd2=document.createElement('td');gtd2.className='sc2';gtd2.textContent='';sr.appendChild(gtd2);
  tbody.appendChild(sr);
}
function fDay(v){return v===0?'-':v%1===0?v+'일':v+'일'}

/* ── DATE MODAL ── */
function openDM(key,d,m){
  selDt=key;selTyp=DB.leaveTypes[0]||'';selIsCustom=false;
  const dnames=['일','월','화','수','목','금','토'];
  document.getElementById('dmTitle').textContent=`${YEAR}년 ${m}월 ${d}일 (${dnames[new Date(YEAR,m-1,d).getDay()]})`;
  document.getElementById('dmSub').textContent='휴가 또는 일정을 등록하세요';
  renderEList(key);
  document.getElementById('empDL').innerHTML=DB.employees.map(e=>`<option value="${e.name}">`).join('');
  document.getElementById('empDL2').innerHTML='<option value="(전체)">' + DB.employees.map(e=>`<option value="${e.name}">`).join('');
  document.getElementById('empIn').value='';
  document.getElementById('cusEmpIn').value='';
  document.getElementById('cusLabel').value='';
  renderTChips();renderCusChips();
  document.getElementById('dModal').style.display='flex';
  setTimeout(()=>document.getElementById('empIn').focus(),80);
}
function closeDM(){document.getElementById('dModal').style.display='none'}

function renderEList(key){
  const ents=DB.entries[key]||[];
  const g=document.getElementById('exGrp');
  const el=document.getElementById('eList');
  if(!ents.length){g.style.display='none';return}
  g.style.display='';el.innerHTML='';
  // 유형별 그룹핑해서 표시
  const leaveEnts=ents.filter(e=>!isCus(e.type));
  const cusEnts=ents.filter(e=>isCus(e.type));
  const allGroups=[
    {label:'휴가',items:leaveEnts},
    {label:'커스텀 일정',items:cusEnts}
  ];
  allGroups.forEach(grp=>{
    if(!grp.items.length)return;
    const header=document.createElement('div');
    header.style.cssText='font-size:10px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin:6px 0 4px;';
    header.textContent=grp.label+' ('+grp.items.length+'건)';
    el.appendChild(header);
    grp.items.forEach((e)=>{
      const i=ents.indexOf(e);
      const emp=DB.employees.find(x=>x.name===e.name);
      const color=isCus(e.type)?'#64748b':(emp?emp.color:'#aaa');
      const item=document.createElement('div');item.className='eit';
      item.style.borderLeft=`3px solid ${color}`;
      item.innerHTML=`
        <div class="ei" style="flex-direction:row;align-items:center;gap:8px">
          <div style="width:28px;height:28px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0">${nShort(e.name).slice(0,1)}</div>
          <div>
            <span class="en" style="color:${color};display:block">${e.name}</span>
            <span class="et">${e.type}${isCus(e.type)?'  <span style="color:#94a3b8;font-size:10px">미카운트</span>':''}</span>
          </div>
        </div>
        <button class="edel" onclick="delEntry('${key}',${i})">×</button>`;
      el.appendChild(item);
    });
  });
}

function renderTChips(){
  const el=document.getElementById('tChips');el.innerHTML='';
  const cmap={'연차':'#2563eb','오전반휴':'#d97706','오후반휴':'#16a34a'};
  DB.leaveTypes.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='tchip'+(!selIsCustom&&t===selTyp?' sel':'');btn.textContent=t;
    if(!selIsCustom&&t===selTyp)btn.style.background=cmap[t]||'#2563eb';
    btn.onclick=()=>{selTyp=t;selIsCustom=false;renderTChips();renderCusChips()};
    el.appendChild(btn);
  });
}

function renderCusChips(){
  const el=document.getElementById('cusChips');if(!el)return;
  el.innerHTML='';
  (DB.customTypes||[]).forEach(t=>{
    const btn=document.createElement('button');
    btn.className='tchip'+(selIsCustom&&t===selTyp?' sel':'');btn.textContent=t;
    if(selIsCustom&&t===selTyp)btn.style.background='#64748b';
    btn.onclick=()=>{selTyp=t;selIsCustom=true;renderTChips();renderCusChips()};
    el.appendChild(btn);
  });
}

// setCusTarget 제거됨 (직원지정에 (전체) 통합)

async function saveEntry(){
  const name=document.getElementById('empIn').value.trim();
  if(!name){toast('직원 이름을 입력하세요','er');return}
  if(!selTyp){toast('휴가 유형을 선택하세요','er');return}
  if(!DB.entries[selDt])DB.entries[selDt]=[];
  if(DB.entries[selDt].find(e=>e.name===name&&e.type===selTyp)){toast('이미 등록된 항목입니다','er');return}
  DB.entries[selDt].push({name,type:selTyp});
  showLD('저장 중...');const ok=await gasWrite();hideLD();
  if(ok){renderEList(selDt);renderAll();document.getElementById('empIn').value='';toast(`${name} · ${selTyp} 등록 완료 ✓`,'ok')}
}

async function saveCusEntry(){
  const label=document.getElementById('cusLabel').value.trim();
  const nameInput=document.getElementById('cusEmpIn').value.trim();
  if(!label){toast('일정 내용을 입력하세요','er');return}
  if(!nameInput){toast('대상 직원을 입력하세요 (전체는 "(전체)" 선택)','er');return}
  if(!DB.customTypes)DB.customTypes=[];
  if(!DB.customTypes.includes(label))DB.customTypes.push(label);
  if(!DB.entries[selDt])DB.entries[selDt]=[];
  if(nameInput==='(전체)'){
    // 전체 직원 등록
    let added=0;
    DB.employees.forEach(emp=>{
      if(!DB.entries[selDt].find(e=>e.name===emp.name&&e.type===label)){
        DB.entries[selDt].push({name:emp.name,type:label});added++;
      }
    });
    if(added===0){toast('이미 전체 등록되어 있습니다','er');return}
  }else{
    if(DB.entries[selDt].find(e=>e.name===nameInput&&e.type===label)){toast('이미 등록된 항목입니다','er');return}
    DB.entries[selDt].push({name:nameInput,type:label});
  }
  showLD('저장 중...');const ok=await gasWrite();hideLD();
  if(ok){renderEList(selDt);renderAll();document.getElementById('cusLabel').value='';document.getElementById('cusEmpIn').value='';toast('커스텀 일정 등록 완료 ✓','ok')}
}

async function delEntry(key,idx){
  if(!confirm('이 항목을 삭제하시겠습니까?'))return;
  DB.entries[key].splice(idx,1);
  if(!DB.entries[key].length)delete DB.entries[key];
  showLD('삭제 중...');const ok=await gasWrite();hideLD();
  if(ok){renderEList(key);renderAll();toast('삭제되었습니다','ok')}
}

/* ── ADMIN ── */
function openAdmin(){
  // 관리자 비번 확인
  const pw = prompt('관리자 비밀번호를 입력하세요');
  if(pw === null) return; // 취소
  if(pw !== ADMIN_PW){ toast('관리자 비밀번호가 올바르지 않습니다','er'); return; }
  aTab(0);document.getElementById('aModal').style.display='flex';
}
function closeAdmin(){document.getElementById('aModal').style.display='none'}
function aTab(i){
  document.querySelectorAll('.atab').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.getElementById('aEmp').style.display=i===0?'':'none';
  document.getElementById('aType').style.display=i===1?'':'none';
  document.getElementById('aCus').style.display=i===2?'':'none';
  if(i===0)renderEmpTg();if(i===1)renderTypeTg();if(i===2)renderCusTg();
}
function renderEmpTg(){
  document.getElementById('empTg').innerHTML=
    DB.employees.map((e,i)=>`<div class="tg"><div class="tgdot" style="background:${e.color}"></div>${e.name}<button class="tgdel" onclick="rmEmp(${i})">×</button></div>`).join('');
}
function renderTypeTg(){
  document.getElementById('typeTg').innerHTML=
    DB.leaveTypes.map((t,i)=>`<div class="tg">${t}<button class="tgdel" onclick="rmType(${i})">×</button></div>`).join('');
}
function renderCusTg(){
  document.getElementById('cusTg').innerHTML=
    (DB.customTypes||[]).map((t,i)=>`<div class="tg">${t}<button class="tgdel" onclick="rmCusType(${i})">×</button></div>`).join('');
}
async function addEmp(){
  const name=document.getElementById('newEn').value.trim();const color=document.getElementById('newEc').value;
  if(!name)return;if(DB.employees.find(e=>e.name===name)){toast('이미 있는 직원','er');return}
  DB.employees.push({name,color});document.getElementById('newEn').value='';
  showLD('저장 중...');await gasWrite();hideLD();renderEmpTg();renderAll();toast(`${name} 추가 완료`,'ok');
}
async function rmEmp(i){
  if(!confirm(`${DB.employees[i].name}을(를) 삭제할까요?`))return;
  DB.employees.splice(i,1);showLD('저장 중...');await gasWrite();hideLD();renderEmpTg();renderAll();toast('삭제됨','ok');
}
async function addType(){
  const name=document.getElementById('newTn').value.trim();
  if(!name)return;if(DB.leaveTypes.includes(name)){toast('이미 있는 유형','er');return}
  DB.leaveTypes.push(name);document.getElementById('newTn').value='';
  showLD('저장 중...');await gasWrite();hideLD();renderTypeTg();toast(`${name} 추가 완료`,'ok');
}
async function rmType(i){
  if(DB.leaveTypes.length<=1){toast('최소 1개 필요','er');return}
  DB.leaveTypes.splice(i,1);showLD('저장 중...');await gasWrite();hideLD();renderTypeTg();toast('삭제됨','ok');
}
async function addCusType(){
  const name=document.getElementById('newCn').value.trim();
  if(!name)return;if(!DB.customTypes)DB.customTypes=[];
  if(DB.customTypes.includes(name)){toast('이미 있는 유형','er');return}
  DB.customTypes.push(name);document.getElementById('newCn').value='';
  showLD('저장 중...');await gasWrite();hideLD();renderCusTg();toast(`${name} 추가 완료`,'ok');
}
async function rmCusType(i){
  DB.customTypes.splice(i,1);showLD('저장 중...');await gasWrite();hideLD();renderCusTg();toast('삭제됨','ok');
}

/* ── UTILS ── */
function showLD(msg='처리 중...'){document.getElementById('ldmsg').textContent=msg;document.getElementById('ldov').style.display='flex'}
function hideLD(){document.getElementById('ldov').style.display='none'}
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+(type||'');
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='toast',2800);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDM();closeAdmin()}});
window.addEventListener('load',()=>document.getElementById('lpw').focus());
</script>
